<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analog Clock</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .clock {
      width: 300px;
      height: 300px;
      border: 10px solid #00ffff;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 0 20px #00ffff70;
    }

    .center {
      width: 12px;
      height: 12px;
      background: #00ffff;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .hand {
      width: 50%;
      background: #00ffff;
      height: 3px;
      position: absolute;
      top: 50%;
      transform-origin: 100%;
      transform: rotate(90deg);
      transition: all 0.05s ease-in;
    }

    .hour {
      height: 5px;
      width: 30%;
      background: #ff9f00;
    }

    .minute {
      height: 4px;
      width: 40%;
      background: #00ff88;
    }

    .second {
      height: 2px;
      width: 47%;
      background: #ff0044;
    }

    .numbers {
      position: absolute;
      width: 100%;
      height: 100%;
      font-size: 1rem;
      color: #ccc;
    }

    .numbers div {
      position: absolute;
      text-align: center;
      width: 30px;
      height: 30px;
      line-height: 30px;
      transform: translate(-50%, -50%);
    }

    /* Position each number (12 hours) */
    .n12 { top: 10px; left: 50%; }
    .n3  { top: 50%; left: 290px; }
    .n6  { top: 290px; left: 50%; }
    .n9  { top: 50%; left: 10px; }
  </style>
</head>
<body>

<div class="clock">
  <div class="numbers">
    <div class="n12">12</div>
    <div class="n3">3</div>
    <div class="n6">6</div>
    <div class="n9">9</div>
  </div>

  <div class="hand hour" id="hour-hand"></div>
  <div class="hand minute" id="minute-hand"></div>
  <div class="hand second" id="second-hand"></div>
  <div class="center"></div>
</div>

<script>
  const hourHand = document.getElementById("hour-hand");
  const minuteHand = document.getElementById("minute-hand");
  const secondHand = document.getElementById("second-hand");

  function updateClock() {
    const now = new Date();
    const seconds = now.getSeconds();
    const minutes = now.getMinutes();
    const hours = now.getHours();

    const secDeg = seconds * 6; // 360 / 60
    const minDeg = minutes * 6 + seconds * 0.1;
    const hourDeg = (hours % 12) * 30 + minutes * 0.5;

    secondHand.style.transform = `rotate(${secDeg}deg)`;
    minuteHand.style.transform = `rotate(${minDeg}deg)`;
    hourHand.style.transform = `rotate(${hourDeg}deg)`;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
